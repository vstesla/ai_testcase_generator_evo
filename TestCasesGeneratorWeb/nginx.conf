server {
    listen 80;
    server_name localhost;

    # Docker 内置 DNS 解析器，用于动态解析 backend 容器 IP（避免容器重建后 IP 缓存导致 502）
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend（正则捕获 /api/ 之后的路径，变量 proxy_pass 确保 DNS 动态解析）
    location ~ ^/api/(.*)$ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
